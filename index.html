<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you go on a date with me? 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff477e;
            --primary-glow: rgba(255, 71, 126, 0.3);
            --bg-card: #fff0f3;
            --text: #5c2c35;
            --vintage-border: #ffb7b2;
            --pink-dark: #9d0208;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Georgia', serif;
            background: radial-gradient(circle at 50% 50%, #ffe5ec 0%, #ffccd5 60%, #ffb7b2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow: hidden;
            position: relative;
        }

        #muteToggle {
            position: absolute; top: 25px; right: 25px;
            background: #fff; border: 2px dashed var(--primary);
            border-radius: 50%; width: 50px; height: 50px;
            font-size: 1.3rem; display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 100; box-shadow: 0 6px 15px rgba(0,0,0,0.05);
        }

        .heart-bg {
            position: absolute; color: rgba(255, 71, 126, 0.3);
            font-size: 28px; animation: floatUp 5s linear infinite;
            bottom: -60px; z-index: 0; pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(0.6); opacity: 1; }
            100% { transform: translateY(-115vh) rotate(360deg) scale(1.3); opacity: 0; }
        }

        .window-container {
            width: 440px; max-width: 92%; height: 635px; position: relative; z-index: 10;
        }

        /* Stile Lettera Vintage / Cartolina Coquette */
        .card {
            position: absolute; width: 100%; height: 100%;
            background: var(--bg-card); padding: 35px 25px; border-radius: 20px;
            border: 4px double var(--vintage-border);
            box-shadow: 0 20px 40px rgba(92, 44, 53, 0.15), inset 0 0 40px rgba(255,255,255,0.6);
            text-align: center; display: flex; flex-direction: column; justify-content: space-between;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0; transform: scale(0.95); pointer-events: none;
        }

        .card.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        .card.exit { opacity: 0; transform: scale(1.05); pointer-events: none; }

        /* Contenitore flessibile che predilige gli Emoji se le gif falliscono */
        .gif-container {
            width: 100%; height: 210px; overflow: hidden; border-radius: 12px;
            background: #fff; display: flex; justify-content: center; align-items: center;
            border: 2px dashed var(--vintage-border); padding: 5px;
            font-size: 5.5rem; /* Fallback Emoji gigante */
            user-select: none;
        }
        .gif-container img { max-height: 100%; max-width: 100%; object-fit: contain; border-radius: 8px; }

        h2 { font-size: 1.6rem; font-style: italic; font-weight: 700; color: var(--pink-dark); line-height: 1.4; }
        .cursor { display: inline-block; width: 2px; background-color: var(--primary); margin-left: 3px; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .btn-container {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; height: 100px; position: relative; width: 100%;
        }

        button {
            padding: 15px 35px; font-size: 1.1rem; border: none; border-radius: 12px;
            cursor: pointer; font-family: 'Georgia', serif; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        #yesBtn {
            background: #ff477e; color: white; border: 2px solid #ff1493;
            box-shadow: 0 6px 15px var(--primary-glow);
        }
        #yesBtn:hover { transform: translateY(-2px); }

        #noBtn { 
            background: #fff; color: #ff477e; border: 2px dashed #ff477e;
            white-space: nowrap; z-index: 99;
        }

        .premium-form { display: flex; flex-direction: column; gap: 15px; text-align: left; }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; }
        
        input[type="date"], input[type="time"] {
            width: 100%; padding: 15px 16px 15px 50px; border: 2px solid var(--vintage-border);
            border-radius: 12px; font-size: 1.1rem; outline: none; background: white;
            color: var(--text); font-family: inherit;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 8px var(--primary-glow); }
        .days-notice { font-size: 0.95rem; color: var(--primary); font-style: italic; font-weight: 700; margin-top: 5px; text-align: center; }

        .grid-food { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .food-option {
            border: 2px solid var(--vintage-border); padding: 18px 10px; border-radius: 14px;
            cursor: pointer; font-size: 1.1rem; text-align: center; background: white;
            font-weight: 700; transition: all 0.2s;
        }
        .food-option:hover { border-color: var(--primary); background: #fff0f3; }
        .food-option.selected {
            border-color: var(--pink-dark); background: #ffccd5; color: var(--pink-dark);
            transform: scale(1.02);
        }

        /* Dettagli in stile pergamena vintage */
        .summary-box { background: #fff; padding: 15px; border-radius: 14px; border: 2px dashed var(--primary); }
        .summary-item { font-size: 1.05rem; margin: 6px 0; text-align: left; font-weight: 700; display: flex; align-items: center; gap: 10px; color: var(--text); }
        
        .countdown-container {
            display: flex; justify-content: space-around; background: #fff0f3;
            color: var(--pink-dark); padding: 12px; border-radius: 14px; border: 2px solid var(--vintage-border);
        }
        .countdown-box { display: flex; flex-direction: column; align-items: center; }
        .countdown-number { font-size: 1.4rem; font-weight: 800; }
        .countdown-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; margin-top: 2px; font-weight: 700; }

        #calBtn { background: #ffb7b2; color: var(--pink-dark); border: 2px solid var(--primary); width: 100%; padding: 15px; border-radius: 12px; font-weight: 700; }
        #calBtn:hover { background: #ffccd5; }

        .sparkle { position: absolute; pointer-events: none; animation: sparkleOut 0.8s linear forwards; z-index: 99; }
        @keyframes sparkleOut {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -130%) scale(0.3); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="muteToggle" onclick="toggleMute()">🎵</div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="window-container">
        <!-- STEP 1 -->
        <div id="step1" class="card active">
            <div class="gif-container">
                <!-- Se l'immagine scarta, l'emoji gigante fa da perfetto design rétro alternativo -->
                <img id="mainGif" src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZndDZsZ3ZxaXN0cnVvNDFpbnM2bW95cmZid294YTZidmF0cndwNSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/c76IJLufpNwSULPk77/giphy.gif" onerror="this.style.display='none'; this.parentElement.innerHTML='🧸🌸'" alt="Cute bear">
            </div>
            <h2><span id="textTarget"></span><span class="cursor"></span></h2>
            <div class="btn-container" id="mainBtnArea">
                <button id="yesBtn" onclick="startRomance()">YES 💖</button>
                <button id="noBtn" onmouseenter="escapeNoBtn()">NO 🥺</button>
            </div>
        </div>

        <!-- STEP 2 -->
        <div id="step2" class="card">
            <h2>When are you free? 📅🐾</h2>
            <div class="premium-form">
                <div class="input-wrapper">
                    <span class="input-icon">📅</span>
                    <input type="date" id="dateInput" onchange="calculateDaysNotice()">
                    <div class="days-notice" id="daysNoticeText"></div>
                </div>
                <div class="input-wrapper">
                    <span class="input-icon">⏰</span>
                    <input type="time" id="timeInput" value="20:00">
                </div>
            </div>
            <button id="yesBtn" onclick="nextStep(3)">Lock Date 💞</button>
        </div>

        <!-- STEP 3 -->
        <div id="step3" class="card">
            <h2>What are we eating? 🍕🍣</h2>
            <div class="grid-food">
                <div class="food-option" onclick="selectFood(this, 'Pizza 🍕')">Pizza 🍕</div>
                <div class="food-option" onclick="selectFood(this, 'Sushi 🍣')">Sushi 🍣</div>
                <div class="food-option" onclick="selectFood(this, 'Burgers 🍔')">Burgers 🍔</div>
                <div class="food-option" onclick="selectFood(this, 'Pasta 🍝')">Pasta 🍝</div>
            </div>
            <button id="yesBtn" onclick="showSummary()">Confirm Menu 💘</button>
        </div>

        <!-- STEP 4 -->
        <div id="step4" class="card">
            <div class="gif-container" style="height: 140px;">
                <img src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExMTRjMTR2YXJ1ZDJ2aTZ3cmN4ZXp6MzBtOHl2MmJpN3k1eWpzbG5jdyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/142t72vk56ASnx84e4/giphy.gif" onerror="this.style.display='none'; this.parentElement.innerHTML='👩‍❤️‍👨💞'" alt="Cute Bears Hugging">
            </div>
            <h2>IT'S OFFICIAL! 🎉</h2>
            <div class="summary-box">
                <div class="summary-item"><span>📅</span> <span id="finalDate"></span></div>
                <div class="summary-item"><span>⏰</span> <span id="finalTime"></span></div>
                <div class="summary-item"><span>🍽️</span> <span id="finalFood"></span></div>
            </div>
            <div class="countdown-container">
                <div class="countdown-box"><span class="countdown-number" id="cdDays">00</span><span class="countdown-label">Days</span></div>
                <div class="countdown-box"><span class="countdown-number" id="cdHours">00</span><span class="countdown-label">Hours</span></div>
                <div class="countdown-box"><span class="countdown-number" id="cdMins">00</span><span class="countdown-label">Mins</span></div>
                <div class="countdown-box"><span class="countdown-number" id="cdSecs">00</span><span class="countdown-label">Secs</span></div>
            </div>
            <button id="calBtn" onclick="addToCalendar()">📅 Add to Calendar</button>
        </div>
    </div>

    <script>
        let selectedFood = "", rawDate = "", rawTime = "", noClickCount = 0, isMuted = false, currentStep = 1;

        const urlParams = new URLSearchParams(window.location.search);
        const nameParam = urlParams.get('name') || "";
        const completeText = `Will you go on a date with me${nameParam ? ', ' + nameParam : ''}? 🌸`;
        let charIndex = 0;
        function typeWriter() {
            if (charIndex < completeText.length) {
                document.getElementById("textTarget").innerHTML += completeText.charAt(charIndex);
                charIndex++; setTimeout(typeWriter, 50);
            }
        }
        window.onload = typeWriter;

        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.85) createSparkle(e.clientX, e.clientY);
        });

        function createSparkle(x, y) {
            const s = document.createElement('div'); s.classList.add('sparkle');
            s.innerText = ['🌸', '💝', '🎀', '✨'][Math.floor(Math.random()*4)];
            s.style.left = x + 'px'; s.style.top = y + 'px';
            s.style.fontSize = Math.random() * 8 + 14 + 'px';
            document.body.appendChild(s); setTimeout(() => s.remove(), 800);
        }

        function audioFeedback(style) {
            if(isMuted) return;
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            if(style === 'escape') {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(280, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.06, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.08);
                osc.start(); osc.stop(ctx.currentTime + 0.08);
            } else if(style === 'win') {
                [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                    const o = ctx.createOscillator(); const g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination); o.type = 'sine';
                    o.frequency.setValueAtTime(f, ctx.currentTime + i*0.06);
                    g.gain.setValueAtTime(0.08, ctx.currentTime + i*0.06);
                    g.gain.linearRampToValueAtTime(0, ctx.currentTime + i*0.06 + 0.15);
                    o.start(ctx.currentTime + i*0.06); o.stop(ctx.currentTime + i*0.06 + 0.15);
                });
            }
        }

        const music = document.getElementById('bgMusic');
        function toggleMute() {
            isMuted = !isMuted; music.muted = isMuted;
            document.getElementById('muteToggle').innerText = isMuted ? "🔇" : "🎵";
        }

        function startRomance() {
            audioFeedback('win');
            document.body.style.background = "radial-gradient(circle at 50% 50%, #ffccd5 0%, #ff85a1 100%)";
            music.volume = 0.25; music.play().catch(()=>{});
            setInterval(() => {
                const h = document.createElement('div'); h.classList.add('heart-bg');
                h.innerText = ['🎀', '🌸', '💕', '💝'][Math.floor(Math.random()*4)];
                h.style.left = Math.random() * 100 + "vw";
                h.style.animationDuration = Math.random() * 2 + 3 + "s";
                document.body.appendChild(h); setTimeout(() => h.remove(), 4500);
            }, 200);
            nextStep(2);
        }

        const noBtn = document.getElementById('noBtn');
        const mainGif = document.getElementById('mainGif');

        function escapeNoBtn() {
            if (currentStep !== 1) return;
            noClickCount++;
            audioFeedback('escape');
            
            // Cambia gif in caso di rifiuto (o mostra emoji triste se bloccata)
            if(mainGif) {
                mainGif.src = "https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZndDZsZ3ZxaXN0cnVvNDFpbnM2bW95cmZid294YTZidmF0cndwNSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/7SF5scGB2AFr1XPumq/giphy.gif";
            }

            if (noClickCount >= 6) {
                noBtn.style.position = 'static'; 
                noBtn.innerText = "Ok... Click YES! 🏳️";
                noBtn.disabled = true; return;
            }

            if (noBtn.style.position !== 'absolute') {
                noBtn.style.position = 'absolute';
                document.getElementById('mainBtnArea').appendChild(noBtn);
            }

            // Griglia di posizioni statiche ed istantanee anti-scatto
            const positions = [
                {x: 35, y: 50}, {x: 275, y: 50},
                {x: 35, y: 460}, {x: 275, y: 460},
                {x: 40, y: 160}, {x: 270, y: 160}
            ];

            const nextPos = positions[(noClickCount - 1) % positions.length];
            noBtn.style.left = nextPos.x + 'px';
            noBtn.style.top = nextPos.y + 'px';
            noBtn.style.transform = `scale(${1 - noClickCount * 0.08})`;
        }

        function calculateDaysNotice() {
            const inputDate = new Date(document.getElementById('dateInput').value);
            const today = new Date();
            today.setHours(0,0,0,0);
            const diffTime = inputDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            const textEl = document.getElementById('daysNoticeText');
            if(diffDays === 0) textEl.innerText = "Tonight? Bold move! 😏✨";
            else if(diffDays === 1) textEl.innerText = "Tomorrow! Counting down the hours... ⏳";
            else if(diffDays > 1) textEl.innerText = `${diffDays} days left! Perfect. 🌸`;
        }

        function nextStep(step) {
            const currentCard = document.getElementById('step' + currentStep);
            const nextCard = document.getElementById('step' + step);
            if(currentCard) { currentCard.classList.remove('active'); currentCard.classList.add('exit'); }
            setTimeout(() => { nextCard.classList.add('active'); currentStep = step; }, 200);
        }

        function selectFood(el, food) {
            document.querySelectorAll('.food-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected'); selectedFood = food;
        }

        function showSummary() {
            if(!selectedFood) return alert("Pick something! 🥺");
            rawDate = document.getElementById('dateInput').value;
            rawTime = document.getElementById('timeInput').value;

            const dateVal = new Date(rawDate);
            document.getElementById('finalDate').innerText = dateVal.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            document.getElementById('finalTime').innerText = `At ${rawTime}`;
            document.getElementById('finalFood').innerText = `Craving ${selectedFood}`;

            nextStep(4);
            
            var end = Date.now() + (4 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0, y: 0.8 }, colors: ['#ff477e', '#ffccd5', '#ffffff'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.8 }, colors: ['#ff477e', '#ffccd5', '#ffffff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            startCountdown(rawDate, rawTime);
        }

        function startCountdown(d, t) {
            const target = new Date(`${d}T${t}:00`).getTime();
            setInterval(() => {
                const diff = target - new Date().getTime();
                if (diff < 0) {
                    document.querySelector('.countdown-container').innerHTML = "<b style='color:var(--pink-dark); font-size:1.1rem;'>It's time for our date! 🥰🥂</b>";
                    return;
                }
                document.getElementById('cdDays').innerText = String(Math.floor(diff / (1000*60*60*24))).padStart(2, '0');
                document.getElementById('cdHours').innerText = String(Math.floor((diff % (1000*60*60*24)) / (1000*60*60))).padStart(2, '0');
                document.getElementById('cdMins').innerText = String(Math.floor((diff % (1000*60*60)) / (1000*60))).padStart(2, '0');
                document.getElementById('cdSecs').innerText = String(Math.floor((diff % (1000*60)) / 1000)).padStart(2, '0');
            }, 1000);
        }

        function addToCalendar() {
            if(!rawDate || !rawTime) return;
            const dateTimeStr = rawDate.replace(/-/g, '') + 'T' + rawTime.replace(/:/g, '') + '00';
            const icsContent = ['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',`DTSTART:${dateTimeStr}`,`DTEND:${dateTimeStr}`,'SUMMARY:Romantic Date! 🌸',`DESCRIPTION:Delicious ${selectedFood} planned. 🥰`,'END:VEVENT','END:VCALENDAR'].join('\r\n');
            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8;' });
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob);
            link.setAttribute('download', 'Romantic_Date.ics'); link.click();
        }

        document.getElementById('dateInput').min = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
        calculateDaysNotice();
    </script>
</body>
</html>
