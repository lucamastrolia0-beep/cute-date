<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you go on a date with me? 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff6b8b;
            --primary-glow: rgba(255, 107, 139, 0.4);
            --bg-card: rgba(255, 255, 255, 0.88);
            --text: #2c3e50;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 50% 50%, #fff3f5 0%, #ffdce3 60%, #ffc2d1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow: hidden;
            position: relative;
        }

        .bg-glow {
            position: absolute; width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(255,182,193,0.5) 0%, rgba(255,255,255,0) 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1; pointer-events: none; transition: transform 0.15s ease-out;
        }

        #muteToggle {
            position: absolute; top: 25px; right: 25px;
            background: var(--bg-card); border: 1px solid rgba(255, 107, 139, 0.2);
            backdrop-filter: blur(10px); border-radius: 50%; width: 50px; height: 50px;
            font-size: 1.3rem; display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .heart-bg {
            position: absolute; color: rgba(255, 107, 139, 0.3);
            font-size: 24px; animation: floatUp 4.5s linear infinite;
            bottom: -60px; z-index: 0; pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(0.6); opacity: 1; }
            100% { transform: translateY(-115vh) rotate(360deg) scale(1.3); opacity: 0; }
        }

        .window-container {
            width: 430px; max-width: 92%; height: 600px; position: relative; z-index: 10;
            perspective: 1000px;
        }

        .card {
            position: absolute; width: 100%; height: 100%;
            background: var(--bg-card); padding: 45px 35px; border-radius: 35px;
            backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 30px 60px rgba(255, 107, 139, 0.18), inset 0 0 25px rgba(255,255,255,0.6);
            text-align: center; display: flex; flex-direction: column; justify-content: space-between;
            transition: all 0.65s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0; transform: translateY(50px) rotateX(-10deg); pointer-events: none;
        }

        .card.active { opacity: 1; transform: translateY(0) rotateX(0deg); pointer-events: auto; }
        .card.exit { opacity: 0; transform: translateY(-50px) rotateX(10deg); pointer-events: none; }

        .shake { animation: intenseShake 0.4s ease-in-out; }
        @keyframes intenseShake {
            0%, 100% { transform: translate(0, 0); }
            20%, 60% { transform: translate(-7px, 1px); }
            40%, 80% { transform: translate(7px, -1px); }
        }

        .gif-container {
            width: 100%; height: 190px; overflow: hidden; border-radius: 22px;
            background: #fff; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); border: 1px solid #ffeef1;
        }
        .gif-container img { height: 100%; width: auto; object-fit: contain; }

        h2 { font-size: 1.75rem; font-weight: 800; color: #2c3e50; line-height: 1.35; letter-spacing: -0.5px; }
        .cursor { display: inline-block; width: 3px; background-color: var(--primary); margin-left: 3px; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .btn-container {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; height: 90px; position: relative; width: 100%;
        }

        button {
            padding: 16px 40px; font-size: 1.15rem; border: none; border-radius: 50px;
            cursor: pointer; font-weight: 700;
        }

        #yesBtn {
            background: linear-gradient(135deg, #ff6b8b, #ff4757); color: white;
            box-shadow: 0 10px 25px var(--primary-glow); animation: heartbeat 1.4s infinite alternate;
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            100% { transform: scale(1.07); box-shadow: 0 15px 30px var(--primary-glow); }
        }
        #yesBtn:hover { transform: translateY(-3px) scale(1.03); }

        #noBtn { 
            background: #f1f2f6; color: #57606f; white-space: nowrap; z-index: 99;
            transition: transform 0.1s ease-out;
        }

        .premium-form { display: flex; flex-direction: column; gap: 20px; text-align: left; }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; pointer-events: none; }
        input[type="date"], input[type="time"] {
            width: 100%; padding: 18px 18px 18px 50px; border: 2px solid #f1f2f6;
            border-radius: 20px; font-size: 1.1rem; outline: none; background: #fdfdfd;
            font-weight: 600; font-family: inherit; color: var(--text); transition: all 0.3s;
        }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 15px rgba(255, 107, 139, 0.2); }
        .days-notice { font-size: 0.85rem; color: #ff6b8b; font-weight: 700; margin-top: 6px; padding-left: 5px; min-height: 18px; }

        .grid-food { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; perspective: 1000px; }
        .food-option {
            border: 2px solid #f1f2f6; padding: 22px 10px; border-radius: 22px;
            cursor: pointer; font-size: 1.1rem; text-align: center; background: white;
            font-weight: 600; transition: transform 0.1s ease, border-color 0.3s, background 0.3s;
            transform-style: preserve-3d;
        }
        .food-option:hover { border-color: #ffb3c6; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
        .food-option.selected {
            border-color: var(--primary); background: #fff0f3;
            transform: scale(1.05) translateZ(10px) !important; font-weight: 800;
            box-shadow: 0 12px 25px rgba(255, 107, 139, 0.15);
        }

        /* Ottimizzazione layout per contenere la nuova GIF */
        .summary-box { background: linear-gradient(135deg, #fff5f7, #ffe3e8); padding: 15px 20px; border-radius: 24px; border: 1px dashed rgba(255, 107, 139, 0.5); }
        .summary-item { font-size: 1.05rem; margin: 6px 0; text-align: left; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        
        .countdown-container {
            display: flex; justify-content: space-around; background: #2c3e50;
            color: white; padding: 14px; border-radius: 22px; box-shadow: inset 0 4px 10px rgba(0,0,0,0.15);
        }
        .countdown-box { display: flex; flex-direction: column; align-items: center; }
        .countdown-number { font-size: 1.4rem; font-weight: 800; color: #ff6b8b; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .countdown-label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.6; margin-top: 3px; font-weight: 700; }

        #calBtn { background: #2ed573; color: white; width: 100%; padding: 16px; border-radius: 16px; transition: all 0.2s; font-weight: 700;}
        #calBtn:hover { box-shadow: 0 8px 20px rgba(46, 213, 115, 0.3); transform: translateY(-2px); }

        .sparkle { position: absolute; pointer-events: none; animation: sparkleOut 0.8s linear forwards; z-index: 99; }
        @keyframes sparkleOut {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -130%) scale(0.3); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-glow" id="glow"></div>
    <div id="muteToggle" onclick="toggleMute()">🎵</div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="window-container">
        <!-- STEP 1 -->
        <div id="step1" class="card active">
            <div class="gif-container">
                <img id="mainGif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZndDZsZ3ZxaXN0cnVvNDFpbnM2bW95cmZid294YTZidmF0cndwNSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/c76IJLufpNwSULPk77/giphy.gif" alt="Cute bear">
            </div>
            <h2><span id="textTarget"></span><span class="cursor"></span></h2>
            <div class="btn-container" id="mainBtnArea">
                <button id="yesBtn" onclick="startRomance()">YES 💖</button>
                <button id="noBtn">NO 🥺</button>
            </div>
        </div>

        <!-- STEP 2 -->
        <div id="step2" class="card">
            <h2>When are you free? 📅🐾</h2>
            <div class="premium-form">
                <div class="input-wrapper">
                    <span class="input-icon">📅</span>
                    <input type="date" id="dateInput" onchange="calculateDaysNotice()">
                    <div class="days-notice" id="daysNoticeText"></div>
                </div>
                <div class="input-wrapper">
                    <span class="input-icon">⏰</span>
                    <input type="time" id="timeInput" value="20:00">
                </div>
            </div>
            <button id="yesBtn" style="animation: none;" onclick="nextStep(3)">Lock Date 💞</button>
        </div>

        <!-- STEP 3 -->
        <div id="step3" class="card">
            <h2>What are we eating? 🍕🍣</h2>
            <div class="grid-food">
                <div class="food-option" onclick="selectFood(this, 'Pizza 🍕')">Pizza 🍕</div>
                <div class="food-option" onclick="selectFood(this, 'Sushi 🍣')">Sushi 🍣</div>
                <div class="food-option" onclick="selectFood(this, 'Burgers 🍔')">Burgers 🍔</div>
                <div class="food-option" onclick="selectFood(this, 'Pasta 🍝')">Pasta 🍝</div>
            </div>
            <button id="yesBtn" style="animation: none;" onclick="showSummary()">Confirm Menu 💘</button>
        </div>

        <!-- STEP 4: CON GIF FUNZIONANTE E SPAZI CORRETTI -->
        <div id="step4" class="card">
            <div class="gif-container" style="height: 130px;">
                <img src="https://media.giphy.com/media/142t72vk56ASnx84e4/giphy.gif" alt="Cute Bears Hugging">
            </div>
            <h2>IT'S OFFICIAL! 🎉</h2>
            <div class="summary-box">
                <div class="summary-item"><span>📅</span> <span id="finalDate"></span></div>
                <div class="summary-item"><span>⏰</span> <span id="finalTime"></span></div>
                <div class="summary-item"><span>🍽️</span> <span id="finalFood"></span></div>
            </div>
            <div class="countdown-container">
                <div class="countdown-box"><span class="countdown-number" id="cdDays">00</span><span class="countdown-label">Days</span></div>
                <div class="countdown-box"><span class="countdown-number" id="cdHours">00</span><span class="countdown-label">Hours</span></div>
                <div class="countdown-box"><span class="countdown-number" id="cdMins">00</span><span class="countdown-label">Mins</span></div>
                <div class="countdown-box"><span class="countdown-number" id="cdSecs">00</span><span class="countdown-label">Secs</span></div>
            </div>
            <button id="calBtn" onclick="addToCalendar()">📅 Add to Calendar</button>
        </div>
    </div>

    <script>
        let selectedFood = "", rawDate = "", rawTime = "", noClickCount = 0, isMuted = false, currentStep = 1;
        const glow = document.getElementById('glow');

        const urlParams = new URLSearchParams(window.location.search);
        const nameParam = urlParams.get('name') || "";
        const completeText = `Will you go on a date with me${nameParam ? ', ' + nameParam : ''}? 🌸`;
        let charIndex = 0;
        function typeWriter() {
            if (charIndex < completeText.length) {
                document.getElementById("textTarget").innerHTML += completeText.charAt(charIndex);
                charIndex++; setTimeout(typeWriter, 60);
            }
        }
        window.onload = typeWriter;

        document.addEventListener('mousemove', (e) => {
            glow.style.transform = `translate(calc(-50% + ${(e.clientX - window.innerWidth/2)*0.08}px), calc(-50% + ${(e.clientY - window.innerHeight/2)*0.08}px))`;
            if (Math.random() > 0.75) createSparkle(e.clientX, e.clientY);
        });

        function createSparkle(x, y) {
            const s = document.createElement('div'); s.classList.add('sparkle');
            s.innerText = ['✨', '🌸', '💖', '⭐'][Math.floor(Math.random()*4)];
            s.style.left = x + 'px'; s.style.top = y + 'px';
            s.style.fontSize = Math.random() * 8 + 10 + 'px';
            document.body.appendChild(s); setTimeout(() => s.remove(), 800);
        }

        function audioFeedback(style) {
            if(isMuted) return;
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            if(style === 'escape') {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(250, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(550, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } else if(style === 'win') {
                [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                    const o = ctx.createOscillator(); const g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination); o.type = 'triangle';
                    o.frequency.setValueAtTime(f, ctx.currentTime + i*0.07);
                    g.gain.setValueAtTime(0.12, ctx.currentTime + i*0.07);
                    g.gain.linearRampToValueAtTime(0, ctx.currentTime + i*0.07 + 0.2);
                    o.start(ctx.currentTime + i*0.07); o.stop(ctx.currentTime + i*0.07 + 0.2);
                });
            }
        }

        const music = document.getElementById('bgMusic');
        function toggleMute() {
            isMuted = !isMuted; music.muted = isMuted;
            document.getElementById('muteToggle').innerText = isMuted ? "🔇" : "🎵";
        }

        function startRomance() {
            audioFeedback('win');
            if(navigator.vibrate) navigator.vibrate([60, 40, 60]);
            document.body.style.background = "radial-gradient(circle at 50% 50%, #2f1c20 0%, #1c0a0d 100%)";
            music.volume = 0.3; music.play().catch(()=>{});
            setInterval(() => {
                const h = document.createElement('div'); h.classList.add('heart-bg');
                h.innerText = ['❤️', '💖', '🌸', '💕'][Math.floor(Math.random()*4)];
                h.style.left = Math.random() * 100 + "vw";
                h.style.animationDuration = Math.random() * 2 + 3 + "s";
                document.body.appendChild(h); setTimeout(() => h.remove(), 4500);
            }, 250);
            nextStep(2);
        }

        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const card1 = document.getElementById('step1');
        const mainGif = document.getElementById('mainGif');

        document.addEventListener('mousemove', (e) => {
            if (currentStep !== 1) return;
            const r = noBtn.getBoundingClientRect();
            const cx = r.left + r.width / 2; const cy = r.top + r.height / 2;
            const dx = e.clientX - cx; const dy = e.clientY - cy;
            const dist = Math.hypot(dx, dy);

            if (dist < 95) {
                noClickCount++;
                audioFeedback('escape');
                card1.classList.add('shake');
                mainGif.src = "https://media.giphy.com/media/7SF5scGB2AFr1XPumq/giphy.gif";
                setTimeout(() => card1.classList.remove('shake'), 400);

                if (noClickCount >= 7) {
                    noBtn.style.position = 'static'; noBtn.style.transform = 'scale(0.65)';
                    noBtn.innerText = "Ok... I give up! Click YES! 🏳️";
                    noBtn.disabled = true; return;
                }

                if (noBtn.style.position !== 'absolute') {
                    noBtn.style.position = 'absolute';
                    document.getElementById('mainBtnArea').appendChild(noBtn);
                }

                let angle = Math.atan2(dy, dx) + Math.PI + (Math.random() - 0.5);
                let speed = 150;
                let nx = cx + Math.cos(angle) * speed - r.width/2;
                let ny = cy + Math.sin(angle) * speed - r.height/2;

                const yesRect = yesBtn.getBoundingClientRect();
                const safeRadius = 110; 
                const yesCX = yesRect.left + yesRect.width / 2;
                const yesCY = yesRect.top + yesRect.height / 2;
                
                let checkDist = Math.hypot((nx + r.width/2) - yesCX, (ny + r.height/2) - yesCY);
                
                if (checkDist < safeRadius) {
                    angle += Math.PI / 2; 
                    nx = cx + Math.cos(angle) * (speed + 40) - r.width/2;
                    ny = cy + Math.sin(angle) * (speed + 40) - r.height/2;
                }

                const p = 50;
                nx = Math.max(p, Math.min(window.innerWidth - r.width - p, nx));
                ny = Math.max(p, Math.min(window.innerHeight - r.height - p, ny));

                noBtn.style.left = nx + 'px'; noBtn.style.top = ny + 'px';
                noBtn.style.transform = `scale(${1 - noClickCount * 0.1})`;
            }
        });

        function calculateDaysNotice() {
            const inputDate = new Date(document.getElementById('dateInput').value);
            const today = new Date();
            today.setHours(0,0,0,0);
            const diffTime = inputDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            const textEl = document.getElementById('daysNoticeText');
            if(diffDays === 0) textEl.innerText = "Uh, that's tonight! Fast mover! 😏🔥";
            else if(diffDays === 1) textEl.innerText = "Tomorrow! Perfect, counting down! ⏳";
            else if(diffDays > 1) textEl.innerText = `Only ${diffDays} days away! Can't wait. ✨`;
        }

        document.querySelectorAll('.food-option').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width/2;
                const y = e.clientY - rect.top - rect.height/2;
                card.style.transform = `rotateX(${-y * 0.15}deg) rotateY(${x * 0.15}deg) scale(1.02)`;
            });
            card.addEventListener('mouseleave', () => {
                if(!card.classList.contains('selected')) card.style.transform = 'rotateX(0) rotateY(0) scale(1)';
                else card.style.transform = 'scale(1.05) translateZ(10px)';
            });
        });

        function nextStep(step) {
            const currentCard = document.getElementById('step' + currentStep);
            const nextCard = document.getElementById('step' + step);
            if(currentCard) { currentCard.classList.remove('active'); currentCard.classList.add('exit'); }
            setTimeout(() => { nextCard.classList.add('active'); currentStep = step; }, 250);
        }

        function selectFood(el, food) {
            document.querySelectorAll('.food-option').forEach(o => { o.classList.remove('selected'); o.style.transform = 'none'; });
            el.classList.add('selected'); selectedFood = food;
        }

        function showSummary() {
            if(!selectedFood) return alert("Pick what you're craving! 🥺");
            rawDate = document.getElementById('dateInput').value;
            rawTime = document.getElementById('timeInput').value;

            const dateVal = new Date(rawDate);
            document.getElementById('finalDate').innerText = dateVal.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            document.getElementById('finalTime').innerText = `At ${rawTime}`;
            document.getElementById('finalFood').innerText = `Craving ${selectedFood}`;

            nextStep(4);
            
            var end = Date.now() + (5 * 1000);
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 60, origin: { x: 0, y: 0.8 }, colors: ['#ff6b8b', '#ffd6e0', '#ffffff'] });
                confetti({ particleCount: 4, angle: 120, spread: 60, origin: { x: 1, y: 0.8 }, colors: ['#ff6b8b', '#ffd6e0', '#ffffff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            startCountdown(rawDate, rawTime);
        }

        function startCountdown(d, t) {
            const target = new Date(`${d}T${t}:00`).getTime();
            setInterval(() => {
                const diff = target - new Date().getTime();
                if (diff < 0) {
                    document.querySelector('.countdown-container').innerHTML = "<b style='color:#ff6b8b; font-size:1.1rem;'>It's time for our date! 🥰🥂</b>";
                    return;
                }
                document.getElementById('cdDays').innerText = String(Math.floor(diff / (1000*60*60*24))).padStart(2, '0');
                document.getElementById('cdHours').innerText = String(Math.floor((diff % (1000*60*60*24)) / (1000*60*60))).padStart(2, '0');
                document.getElementById('cdMins').innerText = String(Math.floor((diff % (1000*60*60)) / (1000*60))).padStart(2, '0');
                document.getElementById('cdSecs').innerText = String(Math.floor((diff % (1000*60)) / 1000)).padStart(2, '0');
            }, 1000);
        }

        function addToCalendar() {
            if(!rawDate || !rawTime) return;
            const dateTimeStr = rawDate.replace(/-/g, '') + 'T' + rawTime.replace(/:/g, '') + '00';
            const icsContent = ['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',`DTSTART:${dateTimeStr}`,`DTEND:${dateTimeStr}`,'SUMMARY:Romantic Date! 🌸',`DESCRIPTION:Delicious ${selectedFood} planned. 🥰`,'END:VEVENT','END:VCALENDAR'].join('\r\n');
            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8;' });
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob);
            link.setAttribute('download', 'Romantic_Date.ics'); link.click();
        }

        document.getElementById('dateInput').min = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
        calculateDaysNotice();
    </script>
</body>
</html>
