<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you go on a date with me? 🌸</title>
    <style>
        :root {
            --bg-color: #f7e1e6;
            --card-bg: #ffffff;
            --primary-color: #d14d72;
            --primary-hover: #b53a5b;
            --text-color: #4a4a4a;
            --border-color: #f3f3f3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            background: radial-gradient(circle at 50% 50%, #fbf0f2 0%, #f7e1e6 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            overflow: hidden;
        }

        .card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(209, 77, 114, 0.12);
            text-align: center;
            max-width: 420px;
            width: 90%;
            border: 1px solid rgba(209, 77, 114, 0.1);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        h2 {
            font-size: 1.65rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: #2b2b2b;
            line-height: 1.4;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 90px;
            position: relative;
            width: 100%;
        }

        button {
            padding: 13px 38px;
            font-size: 1.05rem;
            font-family: 'Georgia', serif;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        #yesBtn {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 12px rgba(209, 77, 114, 0.25);
        }

        #yesBtn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        #noBtn {
            background-color: #f7f7f7;
            color: #777;
            border: 1px solid #ebeeeb;
            position: absolute;
            white-space: nowrap;
        }

        /* Schermate successive */
        .hidden {
            display: none !important;
        }

        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #555;
        }

        input[type="date"], input[type="time"] {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            font-size: 1rem;
            font-family: sans-serif;
            color: var(--text-color);
            outline: none;
            background-color: #fafafa;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 8px rgba(209, 77, 114, 0.1);
        }

        .grid-food {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 30px;
        }

        .food-option {
            border: 2px solid var(--border-color);
            padding: 18px 10px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 1.05rem;
            background-color: #fafafa;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .food-option:hover {
            border-color: #ffd0dc;
            background-color: #fffafb;
        }

        .food-option.selected {
            border-color: var(--primary-color);
            background-color: #fdf0f3;
            font-weight: bold;
            color: var(--primary-color);
            transform: scale(1.02);
        }

        .summary-item {
            background: #fdfdfd;
            border: 1px solid var(--border-color);
            margin: 12px 0;
            padding: 16px;
            border-radius: 14px;
            text-align: left;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .subtext {
            font-size: 0.85rem;
            color: #baafb1;
            margin-top: 25px;
            font-style: italic;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="step1" class="card">
        <h2>🌸 Will you go on a date with me? 🌸</h2>
        <div class="btn-container" id="mainBtnArea">
            <button id="yesBtn" onclick="nextStep(2)">YES 💖</button>
            <button id="noBtn" onmouseenter="moveNoButton()" onclick="moveNoButton()">NO 🥺</button>
        </div>
    </div>

    <div id="step2" class="card hidden">
        <h2>So... when are you free? 📅🐾</h2>
        <div class="input-group">
            <label for="dateInput">Pick a day:</label>
            <input type="date" id="dateInput">
        </div>
        <div class="input-group">
            <label for="timeInput">What time?</label>
            <input type="time" id="timeInput" value="20:00">
        </div>
        <button id="yesBtn" style="width: 100%; margin-top: 10px;" onclick="nextStep(3)">Next 💞</button>
    </div>

    <div id="step3" class="card hidden">
        <h2>What are we feeling? 🍕🥂</h2>
        <div class="grid-food">
            <div class="food-option" onclick="selectFood(this, 'Pizza 🍕')">Pizza 🍕</div>
            <div class="food-option" onclick="selectFood(this, 'Sushi 🍣')">Sushi 🍣</div>
            <div class="food-option" onclick="selectFood(this, 'Burgers 🍔')">Burgers 🍔</div>
            <div class="food-option" onclick="selectFood(this, 'Pasta 🍝')">Pasta 🍝</div>
            <div class="food-option" onclick="selectFood(this, 'Tacos 🌮')">Tacos 🌮</div>
            <div class="food-option" onclick="selectFood(this, 'Ramen 🍜')">Ramen 🍜</div>
        </div>
        <button id="yesBtn" style="width: 100%;" onclick="showSummary()">Next 💘</button>
    </div>

    <div id="step4" class="card hidden">
        <h2 style="font-size: 2rem; margin-bottom: 20px;">YAY!! 💕</h2>
        <div class="summary-item"><span>📅</span> <span id="finalDate"></span></div>
        <div class="summary-item"><span>⏰</span> <span id="finalTime"></span></div>
        <div class="summary-item"><span>🍽️</span> <span id="finalFood"></span></div>
        
        <h3 style="color: var(--primary-color); margin-top: 30px; font-size: 1.4rem; font-style: italic;">I can't wait to see you! 🌷</h3>
        <p class="subtext">(normal guys send texts, I made a website. I'm not like other guys x)</p>
    </div>

    <script>
        let selectedFood = "";
        let noCount = 0;

        // Imposta la data minima a oggi
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').min = today;
        document.getElementById('dateInput').value = today;

        const noBtn = document.getElementById('noBtn');

        // Logica di fuga istantanea e fluida per il pulsante NO
        function moveNoButton() {
            noCount++;
            
            // Al quinto tentativo il pulsante si arrende per evitare frustrazioni, proprio in stile minimal giocoso
            if (noCount >= 6) {
                noBtn.style.position = 'static';
                noBtn.innerText = "Ok, I give up! Click YES! 🏳️";
                noBtn.disabled = true;
                return;
            }

            if (noBtn.style.position !== 'absolute') {
                noBtn.style.position = 'absolute';
                document.getElementById('mainBtnArea').appendChild(noBtn);
            }

            // Coordinate precalcolate all'interno della card o immediate vicinanze per un movimento pulito
            const safePositions = [
                {x: 20, y: -60},   {x: 240, y: -60},
                {x: 20, y: 110},   {x: 240, y: 110},
                {x: 130, y: -75},  {x: 130, y: 125}
            ];

            const pos = safePositions[(noCount - 1) % safePositions.length];
            noBtn.style.left = pos.x + 'px';
            noBtn.style.top = pos.y + 'px';
            
            // Si rimpicciolisce leggermente ad ogni fuga
            noBtn.style.transform = `scale(${1 - noCount * 0.07})`;
        }

        function nextStep(step) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            
            document.getElementById('step' + step).classList.remove('hidden');
        }

        function selectFood(element, food) {
            document.querySelectorAll('.food-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedFood = food;
        }

        function showSummary() {
            if(!selectedFood) {
                alert("Please select what you want to eat! 🥺");
                return;
            }
            
            const dateVal = new Date(document.getElementById('dateInput').value);
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            // Formato data elegante in inglese come nel video
            const formattedDate = dateVal.toLocaleDateString('en-US', options);
            
            const timeVal = document.getElementById('timeInput').value;
            // Converte formato 24h in 12h AM/PM per riflettere il video originale
            const [hours, minutes] = timeVal.split(':');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const formattedTime = ((hours % 12) || 12) + ':' + minutes + ' ' + ampm;

            document.getElementById('finalDate').innerText = formattedDate;
            document.getElementById('finalTime').innerText = formattedTime;
            document.getElementById('finalFood').innerText = selectedFood;

            nextStep(4);

            // Effetto coriandoli rosa delicati alla fine per celebrare il sì
            var end = Date.now() + (3 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0, y: 0.85 }, colors: ['#d14d72', '#f7e1e6'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.85 }, colors: ['#d14d72', '#f7e1e6'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
