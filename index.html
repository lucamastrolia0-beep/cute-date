<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you go on a date with me? 🌸</title>
    <!-- Libreria esterna per l'effetto coriandoli (Canvas-Confetti) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #f7e1e6;
            --card-bg: #ffffff;
            --primary-color: #d14d72;
            --text-color: #4a4a4a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            overflow: hidden;
            position: relative;
            transition: background-color 1s ease; /* Transizione fluida dello sfondo */
        }

        /* Sfondo con cuori animati */
        .heart-bg {
            position: absolute;
            color: rgba(209, 77, 114, 0.2);
            font-size: 20px;
            animation: floatUp 6s linear infinite;
            bottom: -50px;
            z-index: 0;
            user-select: none;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-105vh) rotate(360deg); opacity: 0; }
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(209, 77, 114, 0.15);
            text-align: center;
            max-width: 400px;
            width: 90%;
            z-index: 10;
            animation: fadeIn 0.5s ease-out;
        }

        .gif-container {
            width: 100%;
            max-height: 150px;
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .gif-container img {
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: #333;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 80px;
            position: relative;
        }

        button {
            padding: 12px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(209, 77, 114, 0.3);
        }

        #yesBtn {
            background-color: var(--primary-color);
            color: white;
        }

        #noBtn {
            background-color: #f0f0f0;
            color: #666;
            position: absolute;
            transition: all 0.2s ease;
        }

        .hidden { display: none !important; }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="date"], input[type="time"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary-color); }

        .grid-food {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .food-option {
            border: 2px solid #f0f0f0;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            background: white;
        }

        .food-option:hover {
            transform: translateY(-2px);
            border-color: #ffb3c6;
        }

        .food-option.selected {
            border-color: var(--primary-color);
            background-color: #fdf0f3;
            transform: scale(1.02);
        }

        .summary-item {
            background: #fdf0f3;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            font-size: 1.1rem;
            border-left: 4px solid var(--primary-color);
        }

        .subtext {
            font-size: 0.8rem;
            color: #999;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- Canzoncina di sottofondo -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <!-- STEP 1: La Proposta -->
    <div id="step1" class="card">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZndDZsZ3ZxaXN0cnVvNDFpbnM2bW95cmZid294YTZidmF0cndwNSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/c76IJLufpNwSULPk77/giphy.gif" alt="Cute mocha bear">
        </div>
        <h2>🌸 Will you go on a date with me<span id="customName"></span>? 🌸</h2>
        <div class="btn-container">
            <button id="yesBtn" onclick="startRomance()">YES 💖</button>
            <button id="noBtn">NO 🥺</button>
        </div>
    </div>

    <!-- STEP 2: Quando e l'Ora -->
    <div id="step2" class="card hidden">
        <h2>So... when are you free? 📅🐾</h2>
        <div class="input-group">
            <label for="dateInput">Pick a day:</label>
            <input type="date" id="dateInput">
        </div>
        <div class="input-group">
            <label for="timeInput">What time?</label>
            <input type="time" id="timeInput" value="20:00">
        </div>
        <button id="yesBtn" style="width: 100%;" onclick="nextStep(3)">Next 💞</button>
    </div>

    <!-- STEP 3: Il Cibo -->
    <div id="step3" class="card hidden">
        <h2>What are we feeling? 🍕🥂</h2>
        <div class="grid-food">
            <div class="food-option" onclick="selectFood(this, 'Pizza 🍕')">Pizza 🍕</div>
            <div class="food-option" onclick="selectFood(this, 'Sushi 🍣')">Sushi 🍣</div>
            <div class="food-option" onclick="selectFood(this, 'Burgers 🍔')">Burgers 🍔</div>
            <div class="food-option" onclick="selectFood(this, 'Pasta 🍝')">Pasta 🍝</div>
        </div>
        <button id="yesBtn" style="width: 100%;" onclick="showSummary()">Next 💘</button>
    </div>

    <!-- STEP 4: Riepilogo Finale -->
    <div id="step4" class="card hidden">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHI3M281N2thb3F6cjN6Znd6cmg4MWhmb3BvczAwZzd0NGYxa2FpOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/dU6bZkr08L0CHvIm6e/giphy.gif" alt="Happy bear jump">
        </div>
        <h2>YAY!! 💕 🎉</h2>
        <div class="summary-item">📅 <span id="finalDate"></span></div>
        <div class="summary-item">⏰ <span id="finalTime"></span></div>
        <div class="summary-item">🍽️ <span id="finalFood"></span></div>
        <h3 style="color: var(--primary-color); margin-top: 25px;">I can't wait to see you! ✨</h3>
        <p class="subtext">(normal guys send texts, I made a website. I'm not like other guys xx)</p>
    </div>

    <script>
        let selectedFood = "";

        // FUNZIONE 1: Leggi il nome dall'URL (Es: link.com?name=Giulia)
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        if (name) {
            document.getElementById('customName').innerText = ", " + name;
        }

        // Generatore di cuori
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            const hearts = ['❤️', '💖', '🌸', '💕', '💘'];
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 4 + "s";
            heart.style.fontSize = Math.random() * 15 + 15 + "px";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 7000);
        }
        let heartInterval = setInterval(createHeart, 800);

        // Click su YES (Inizio musica + vibrazione + cambio colore sfondo)
        function startRomance() {
            const music = document.getElementById('bgMusic');
            music.volume = 0.4;
            music.play().catch(e => console.log("Audio in attesa"));
            
            // Vibrazione (solo su mobile supportati)
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            // Lo sfondo diventa di un rosa più caldo e intenso
            document.body.style.backgroundColor = "#fcd5dc";

            clearInterval(heartInterval);
            heartInterval = setInterval(createHeart, 300); 

            nextStep(2);
        }

        // Configurazione Date minima
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').min = today;
        document.getElementById('dateInput').value = today;

        // Bottone NO che scappa
        const noBtn = document.getElementById('noBtn');
        function moveNoButton() {
            const padding = 50;
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - (padding * 2)) + padding;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - (padding * 2)) + padding;
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }
        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('click', moveNoButton); 

        function nextStep(step) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step' + step).classList.remove('hidden');
        }

        function selectFood(element, food) {
            document.querySelectorAll('.food-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedFood = food;
        }

        // FUNZIONE 2: Mostra riepilogo + Esplosione Coriandoli reali
        function showSummary() {
            if(!selectedFood) {
                alert("Please select what you want to eat! 🥺");
                return;
            }
            
            const dateVal = new Date(document.getElementById('dateInput').value);
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            const formattedDate = dateVal.toLocaleDateString('en-US', options);
            const timeVal = document.getElementById('timeInput').value;

            document.getElementById('finalDate').innerText = formattedDate;
            document.getElementById('finalTime').innerText = timeVal;
            document.getElementById('finalFood').innerText = selectedFood;

            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.remove('hidden');

            // Pioggia fitta di cuori in background
            clearInterval(heartInterval);
            setInterval(createHeart, 150);

            // ESPLOSIONE DI CORIANDOLI!
            var duration = 4 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                // Coriandoli da sinistra
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0, y: 0.8 }, colors: ['#d14d72', '#ffb3c6', '#ffffff'] });
                // Coriandoli da destra
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.8 }, colors: ['#d14d72', '#ffb3c6', '#ffffff'] });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
